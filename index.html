<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can I count on your allyship?</title>
    <meta name="description" content="An interactive allyship story about supporting LGBTQ+ colleagues in the workplace.">
    <meta name="theme-color" content="#d63384">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Can I Count on Your Allyship?">
    <meta property="og:description" content="An interactive allyship story about supporting LGBTQ+ colleagues in the workplace.">
    <meta property="og:url" content="https://tanvid18.github.io/workplace-allyship/">
    <meta property="og:image" content="https://tanvid18.github.io/workplace-allyship/gifs/neutral.gif">
    <meta property="og:site_name" content="Allyship Interactive Story">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Can I Count on Your Allyship?">
    <meta name="twitter:description" content="An interactive allyship story about supporting LGBTQ+ colleagues in the workplace.">
    <meta name="twitter:image" content="https://tanvid18.github.io/workplace-allyship/gifs/neutral.gif">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="ally-page">
    <div class="hearts-bg"></div>

    <div class="container">
        <h1>Do you support LGBTQ+ colleagues?</h1>

        <div class="gif-container">
            <img id="cat-gif" src="gifs/neutral.gif" alt="neutral character">
            <div id="gif-thought" class="gif-thought" aria-live="polite"></div>
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <audio id="bg-music" loop>
        <source src="music/musicorchestral.mp3.mpeg" type="audio/mpeg">
    </audio>

    <button id="music-hint" class="music-hint" onclick="toggleMusic()" title="Play music">
        Tap speaker for music
    </button>
    <button id="music-toggle" onclick="toggleMusic()" title="Play or pause music">🔈</button>

    <script src="ally-script.js"></script>
</body>
</html>
