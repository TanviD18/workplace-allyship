<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can I count on your allyship?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="ally-page">
    <div class="hearts-bg"></div>

    <div class="container">
        <h1>Do you support LGBTQ+ colleagues?</h1>

        <div class="gif-container">
            <img id="cat-gif" src="gifs/neutral.gif" alt="neutral character">
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <audio id="bg-music" loop autoplay muted>
        <!-- replace this file with an upbeat/allyship track (e.g. a Pride anthem) -->
        <source src="music/pride-anthem.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="ally-script.js"></script>
</body>
</html>
